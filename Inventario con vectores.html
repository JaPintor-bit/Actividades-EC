<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<div id="App"></div>
    <form>
        <label for="txtCodi">
            Codigo:<input type="text" id="txtCodi">
        </label>
        <label for="txtNomb">
            Nombre:<input type="text" id="txtNomb">
        </label>
        <label for="numCant">
            Cantidad:<input type="number" id="numCant">
        </label>
        <label for="numCost">
            Costo:<input type="number" id="numCost">
        </label>
        <button type="button" id="btnAdd">Agregar al final</button>
        <button type="button" id="btnDel">Borrar</button>
        <button type="button" id="btnList">Listado</button>
        <button type="reset">Cancelar</button>
        <button type="button" id="btnExt1er">Extraer primer elemento</button>
        <button type="button" id="btnAddInicio">Agregar al inicio</button>
        <button type="button" id="btnInsertar">Insertar en</button>
        <button type="button" id="btnBuscar">Buscar</button>
    </form>
    <div id="detalles"></div>

    <body>
    <script>
        //producto.js
    class Producto{
        constructor(codigo, nombre, cantidad, costo) {
            this.codigo = codigo;
            this.nombre = nombre;
            this.cantidad = cantidad;
            this.costo = costo;
        }
        infoHTML(){
            return `
            <div>
                <h3>Codigo: ${this.codigo}</h3>
                <h4>Nombre: ${this.nombre}</h4>
                <p>$${this.costo} (${this.cantidad})</p>
            </div>
            `
                
        }
    }
    //inventario.js
    class Inventario{
        constructor(){
        this.datos=[]
     }
        // Recorre todo el arreglo y compara el código dado con el del producto, si lo encuentra retorna el producto, en caso de que no simplemente no hace nada
        buscar(codigo){
            for (let i = 0; i < this.datos.length; i++) {
                if (codigo == this.datos[i].codigo)
                    return this.datos[i];
            }
            return null
        }
        agregar(producto){
            this.datos.push(producto)
        }
        // Recorre todo el arreglo y guarda la información de cada producto en la variable texto, luego retorna esa variable
        listar() {
            let texto = "";
            for (let i = 0; i < this.datos.length; i++) {
                texto += this.datos[i].infoHTML();
            }
            return texto;
        }
        // Recorre todo el arreglo comparando el código dado con el código del producto, una vez lo encuentra, mueve los elementos posterior a este una posición a la izquierdad, lo que sobreescribe el producto que se quiere eliminar, al final se utiliza pop para elminar el elemento duplicado.
        eliminar(codigo) {
            for (let i = 0; i < this.datos.length; i++) {
                if (this.datos[i].codigo === codigo) {
                    for (let j = i; j < this.datos.length - 1; j++) {
                        this.datos[j] = this.datos[j + 1];
                    }   
                    this.datos.pop();
                }
            }
        }
        //Guarda el primer elemento en la variable primer, luego mueve todos los elementos una posición a la izquierda, esto sobreescribe los elementos del array con el elemento posterior a ellos y al final se utiliza pop para eliminar el ultimo elemento del arreglo (termina siendo un duplicado del penultimo)
        extraerPrimer() {
            if (this.datos.length > 0){
                let primer = this.datos[0];
                for (let i = 0; i < this.datos.length - 1; i++) {
                    this.datos[i] = this.datos[i + 1];
                }
                this.datos.pop();
                return primer;
            }
        }
        // .length nos da el largo del arreglo, el cual siempre es 1 mayor que el ultimo índice de este mismo, siempre y cuando no se dejen espacios vacios, por lo que al asignarle un valor se crea un nuevo elemento en esa posición. Se mueven el resto de los elementos una posición a la derecha, lo que deja el elemento 0 vacio y disponible para asignarle el nuevo producto.
        agregarInicio(producto){
            for (let i = this.datos.length; i > 0; i--) {
                this.datos[i] = this.datos[i - 1];
            }
            this.datos[0] = producto;
        }
        // Inserta un producto en la posición indicada, desplazando los siguientes elementos hacia la derecha.
        insertarEn(posicion, producto) {
            if (posicion < 0) {
                posicion = 0;
            }
            if (posicion > this.datos.length) {
                posicion = this.datos.length;
            }
            for (let i = this.datos.length; i > posicion; i--) {
                this.datos[i] = this.datos[i - 1];
            }
            this.datos[posicion] = producto;
        }
    }
        // app.js
        let miInvent= new Inventario
        miInvent.agregar(new Producto(1,"lapiz",10,100))
        
        const btnAdd=document.getElementById("btnAdd")
        const detalles=document.getElementById("detalles")
        btnAdd.addEventListener("click",()=>{
            let codigo=document.getElementById("txtCodi").value
            let nombre=document.getElementById("txtNomb").value
            let cantidad=document.getElementById("numCant").value
            let costo=document.getElementById("numCost").value
            let producto = new Producto(codigo,nombre,cantidad,costo);
            miInvent.agregar(producto);
            detalles.innerHTML+=`<p>Se agrego ${nombre}</p>`
        })
        const btnList=document.getElementById("btnList")
        btnList.addEventListener("click",()=>{
            let detalles= document.getElementById("detalles")
            detalles.innerHTML=miInvent.listar()
        })
        const btnDel=document.getElementById("btnDel")
        btnDel.addEventListener("click",()=>{
            let codigo=document.getElementById("txtCodi").value
            miInvent.eliminar(codigo)
            detalles.innerHTML+=`<p>Se eliminó el elemento ${codigo}</p>`
        })
        const btnExt1er=document.getElementById("btnExt1er")
        btnExt1er.addEventListener("click",()=>{
            let producto = miInvent.extraerPrimer()
            if(producto){
                detalles.innerHTML=`<p>Se extrajo el siguiente elemento: ${producto.infoHTML()}</p>`
            }else{
                detalles.innerHTML=`<p>No hay elementos en el inventario</p>`
            }
        })
        const btnAddInicio=document.getElementById("btnAddInicio")
        btnAddInicio.addEventListener("click",()=>{
            let codigo = document.getElementById("txtCodi").value;
            let nombre = document.getElementById("txtNomb").value;
            let cantidad = document.getElementById("numCant").value;
            let costo = document.getElementById("numCost").value;
            let producto = new Producto(codigo,nombre,cantidad,costo);
            miInvent.agregarInicio(producto);
            detalles.innerHTML+=`<p>Producto insertado en la primera posición: ${nombre}</p>`
        })
        const btnInsertar=document.getElementById("btnInsertar")
        btnInsertar.addEventListener("click",()=>{
            let codigo = document.getElementById("txtCodi").value;
            let nombre = document.getElementById("txtNomb").value;
            let cantidad = document.getElementById("numCant").value;
            let costo = document.getElementById("numCost").value;
            let posicion = parseInt(prompt("Ingrese la posición donde desea insertar el producto:"));
            let producto = new Producto(codigo,nombre,cantidad,costo);
            miInvent.insertarEn(posicion, producto);
            detalles.innerHTML+=`<p>Se insertó ${nombre} en la posición ${posicion}</p>`
        })
        const btnBuscar=document.getElementById("btnBuscar")
        btnBuscar.addEventListener("click",()=>{
            let codigo = document.getElementById("txtCodi").value;
            let producto = miInvent.buscar(codigo);
            if(producto){
                detalles.innerHTML=`<p>Producto encontrado: ${producto.infoHTML()}</p>`
            }else{
                detalles.innerHTML=`<p>No se encontró el producto con código ${codigo}</p>`
            }
        })
    

    </script>
</body>
</html>
